<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Devices Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

body{
    background: #f5f7ff;
    color: #111827;
}

/* TOP NAV */
nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
}

.navs{
    display: flex;
    align-items: center;
    gap: 15px;
}

.navs h1{
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
}

nav a{
    text-decoration: none;
    font-size: 13px;
    color: #6b7280;
    padding: 7px 10px;
    border-radius: 8px;
    transition: 0.2s;
}

nav a:hover{
    background: #f3f4f6;
    color: #111827;
}

nav a.active{
    background: #111827;
    color: white;
}

.logout a{
    color: #ef4444;
    font-weight: 600;
}

/* TITLE */
h2{
    text-align: center;
    margin-top: 110px;
    font-size: 20px;
}

/* MAIN */
main{
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

/* FORM CARD */
.form form{
    width: 500px;
    background: white;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* INPUT GROUP */
.form div{
    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* LABEL */
label{
    font-size: 13px;
    color: #374151;
}

/* INPUTS */
.form input,
.form select,
.form textarea{
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    background: #fafafa;
    outline: none;
    transition: 0.2s;
}

/* FOCUS */
.form input:focus,
.form select:focus,
.form textarea:focus{
    border-color: #111827;
    background: white;
}

/* TEXTAREA */
.form textarea{
    min-height: 90px;
    resize: vertical;
}

/* BUTTON */
.form button{
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #111827;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.form button:hover{
    transform: translateY(-2px);
}

/* SMALL GRID FEEL (OPTIONAL IMPROVEMENT) */
.form form div:nth-child(2),
.form form div:nth-child(3),
.form form div:nth-child(4),
.form form div:nth-child(6),
.form form div:nth-child(7){
    margin-bottom: 2px;
}
</style>

<body>

<nav>
    <div class="navs">
        <h1>INV</h1>

        <a href="/dashboard">Dashboard</a>
        <a href="/employee">Employees</a>
        <a href="/devices" class="active">Devices</a>
        <a href="/department">Departments</a>
        <a href="/assegnment">Assignment</a>
        <a href="/history">History</a>
    </div>

    <div class="logout">
        <a href="/logout">Logout</a>
    </div>
</nav>

<h2>Add New Device</h2>

<main class="form">

<form th:action="@{/devices/save}" method="post" th:object="${devices}">

    <input type="hidden" th:field="*{id}">

    <div>
        <label>Serial Number</label>
        <input type="text" th:field="*{serialNumber}" required>
    </div>

    <div>
        <label>Device Type</label>
        <select th:field="*{type}">
            <option value="Laptop">Laptop</option>
            <option value="Desktop">Desktop</option>
            <option value="Mobile">Mobile</option>
        </select>
    </div>

    <div>
        <label>Brand</label>
        <input type="text" th:field="*{brand}" required>
    </div>

    <div>
        <label>Model</label>
        <input type="text" th:field="*{model}" required>
    </div>

    <div>
        <label>Specifications</label>
        <textarea th:field="*{specifications}"></textarea>
    </div>

    <div>
        <label>Condition</label>
        <select th:field="*{conditions}">
            <option value="Good">Good</option>
            <option value="Bad">Bad</option>
            <option value="Normal">Normal</option>
        </select>
    </div>

    <div>
        <label>Status</label>
        <select th:field="*{status}">
            <option value="Available">Available</option>
            <option value="Assigned">Assigned</option>
            <option value="Repair">Repair</option>
            <option value="Retired">Retired</option>
        </select>
    </div>

    <button type="submit">Save Device</button>

</form>

</main>

</body>
</html>
