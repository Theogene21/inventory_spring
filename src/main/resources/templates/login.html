<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Verdana, sans-serif;
}

/* BACKGROUND */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #0f172a, #020617);
}

/* MAIN CARD */
.auth{
    width:900px;
    height:520px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* LEFT SIDE */
.first{
    width:100%;
    background:#111827;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:50px;
    gap:20px;
}



/* TITLE */
h2{
    font-size:26px;
    color:#e2e8f0;
}

.second h2{
    color:white;
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* INPUT STYLE */
input{
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#0f172a;
    color:white;
    border:1px solid #1f2937;
    transition:0.2s;
}

input:focus{
    border-color:#38bdf8;
}

/* BUTTON */
button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:#0f172a;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
}

/* RIGHT SIDE TEXT */
.second p{
    font-size:14px;
    line-height:1.5;
    opacity:0.9;
}

/* LINK BUTTON */
.second a{
    margin-top:20px;
    display:inline-block;
    text-align:center;
    padding:10px;
    background:white;
    color:#0ea5e9;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.second a:hover{
    background:#e2e8f0;
}

/* ERROR */
.error{
    color:#f87171;
    font-size:13px;
}
</style>

<body>

<main>

<section class="auth">

    <section class="first">

        <h2>Welcome Back</h2>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <form th:action="@{/login}" method="post" th:object="${user}">
            <input type="text" th:field="*{username}" placeholder="Username" required />
            <input type="password" th:field="*{password}" placeholder="Password" required />
            <button type="submit">Sign In</button>
            <a href="/register">Create Account</a>
        </form>

    </section>

</section>

</main>

</body>
</html>
