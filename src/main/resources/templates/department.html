<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Department Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

body{
    background: #f4f6ff;
    color: #111827;
}

/* TOP NAV */
nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.navs{
    display: flex;
    align-items: center;
    gap: 15px;
}

.navs h1{
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
}

nav a{
    text-decoration: none;
    font-size: 13px;
    color: #6b7280;
    padding: 7px 10px;
    border-radius: 8px;
    transition: 0.2s;
}

nav a:hover{
    background: #f3f4f6;
    color: #111827;
}

nav a.active{
    background: #111827;
    color: white;
}

.logout a{
    color: #ef4444;
    font-weight: 600;
}

/* PAGE TITLE */
h2{
    text-align: center;
    margin-top: 110px;
    font-size: 20px;
}

/* FORM WRAPPER */
main{
    display: flex;
    justify-content: center;
    margin-top: 25px;
}

/* FORM CARD */
.form form{
    width: 420px;
    background: white;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* INPUTS */
.form input{
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    outline: none;
    background: #fafafa;
    transition: 0.2s;
}

.form input:focus{
    border-color: #111827;
    background: white;
}

/* LABELS */
label{
    font-size: 13px;
    color: #374151;
}

/* BUTTON */
.form button{
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #111827;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.form button:hover{
    transform: translateY(-2px);
}

/* INPUT GROUP */
.form div{
    display: flex;
    flex-direction: column;
    gap: 6px;
}
</style>

<body>

<nav>
    <div class="navs">
        <h1>INV</h1>

        <a href="/dashboard">Dashboard</a>
        <a href="/employee">Employees</a>
        <a href="/devices">Devices</a>
        <a href="/department" class="active">Departments</a>
        <a href="/assegnment">Assignment</a>
        <a href="/history">History</a>
    </div>

    <div class="logout">
        <a href="/logout">Logout</a>
    </div>
</nav>

<h2>Create Department</h2>

<main class="form">

<form th:action="@{/department/save}" method="post" th:object="${department}">

    <input type="hidden" th:field="*{id}">

    <div>
        <label>Department Name</label>
        <input type="text" th:field="*{name}" required>
    </div>

    <div>
        <label>Location</label>
        <input type="text" th:field="*{location}" required>
    </div>

    <button type="submit">Save Department</button>

</form>

</main>

</body>
</html>
