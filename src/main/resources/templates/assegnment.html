<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Assignment</title>
</head>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
}

body{
    background: #f5f7ff;
    color: #1f2937;
}

/* NEW TOP BAR */
nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 72px;
    background: #ffffff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.06);
}

.navs{
    display: flex;
    align-items: center;
    gap: 18px;
}

.navs h1{
    font-size: 18px;
    letter-spacing: 2px;
    color: #111827;
}

nav a{
    text-decoration: none;
    font-size: 13px;
    color: #6b7280;
    padding: 6px 10px;
    border-radius: 8px;
    transition: 0.25s;
}

nav a:hover{
    background: #f3f4f6;
    color: #111827;
}

nav a.active{
    background: #111827;
    color: white;
}

.logout a{
    color: #ef4444;
    font-weight: 500;
}

/* PAGE WRAPPER */
main{
    margin-top: 110px;
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* FORM CARD LAYOUT */
.form form{
    width: 480px;
    background: white;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* TITLE */
h2{
    text-align: center;
    font-size: 20px;
    margin-bottom: 10px;
}

/* FORM ELEMENTS */
label{
    font-size: 13px;
    color: #374151;
}

.form input,
.form select{
    width: 100%;
    padding: 11px;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    outline: none;
    transition: 0.2s;
    background: #fafafa;
}

.form input:focus,
.form select:focus{
    border-color: #111827;
    background: white;
}

/* BUTTON */
.form button{
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #111827;
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

.form button:hover{
    transform: translateY(-2px);
}

/* SMALL LAYOUT FIX */
.form div{
    display: flex;
    flex-direction: column;
    gap: 6px;
}
</style>

<body>

<nav>
	<div class="navs">	
		<h1>INV</h1>

        <a href="/dashboard">Dashboard</a>
        <a href="/employee">Employees</a>
        <a href="/devices">Devices</a>
        <a href="/department">Departments</a>
        <a href="/assegnment" class="active">Assignment</a>
        <a href="/history">History</a>
	</div>

	<div class="logout">	
		<a href="/logout">Logout</a>
	</div>
</nav>

<main class="form">

<form th:action="@{/assignments/save}" method="post" th:object="${assegnment}">

    <h2>Create Assignment</h2>

    <input type="hidden" th:field="*{id}">

    <div>
        <label>Issue Date</label>
        <input type="date" th:field="*{issueDate}" required>
    </div>

    <div>
        <label>Return Date</label>
        <input type="date" th:field="*{returnDate}">
    </div>

    <div>
        <label>Status</label>
        <select th:field="*{status}">
            <option value="ISSUED">Issued</option>
            <option value="RETURNED">Returned</option>
            <option value="OVERDUE">Overdue</option>
        </select>
    </div>

    <div>
        <label>Device</label>
        <select th:field="*{device}">
            <option th:each="dev : ${device}"
                    th:value="${dev.id}"
                    th:text="${dev.serialNumber}">
            </option>
        </select>
    </div>

    <div>
        <label>Employee</label>
        <select th:field="*{employee}">
            <option th:each="emp : ${employee}"
                    th:value="${emp.id}"
                    th:text="${emp.name}">
            </option>
        </select>
    </div>

    <button type="submit">Create Assignment</button>

</form>

</main>

</body>
</html>
